<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Receipt - Charoen Krung 3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-glow: #f59e0b;
            --accent-color: #ffd700;
            --bg-dark: #07090e;
            --bg-dark-lighter: #111827;
            --card-bg: rgba(20, 25, 35, 0.65);
            --glass-border: rgba(255, 215, 0, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --purple-color: #800080;
        }

        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.08), transparent 35%),
                radial-gradient(circle at 80% 80%, rgba(128, 0, 128, 0.10), transparent 35%),
                radial-gradient(circle at 50% 10%, rgba(245, 158, 11, 0.06), transparent 30%),
                linear-gradient(135deg, #04060b 0%, #0b0f1a 45%, #06080d 100%);
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -40%;
            background:
                radial-gradient(circle, rgba(255, 215, 0, 0.10) 0%, transparent 55%),
                radial-gradient(circle, rgba(128, 0, 128, 0.08) 0%, transparent 50%);
            animation: glowMove 16s linear infinite;
            z-index: 0;
            pointer-events: none;
            filter: blur(40px);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes glowMove {
            0%   { transform: translate(-10%, -10%) rotate(0deg); }
            50%  { transform: translate(10%, 10%) rotate(180deg); }
            100% { transform: translate(-10%, -10%) rotate(360deg); }
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 1.5rem 1.2rem;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        .condo-logo {
            width: 260px;
            filter: drop-shadow(0 0 18px rgba(255, 215, 0, 0.28));
            margin-bottom: 0.5rem;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .main-title {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            line-height: 1;
            background: linear-gradient(to right, #ffffff, #ffe082, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.55));
        }

        .brand-section p {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-top: 15px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .search-card {
            background: rgba(18, 22, 32, 0.62);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 215, 0, 0.12);
            border-radius: 28px;
            padding: 1.8rem 1.5rem;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.72),
                inset 0 1px 0 rgba(255,255,255,0.03),
                0 0 0 1px rgba(255,215,0,0.03);
        }

        .form-control {
            background: rgba(0, 0, 0, 0.38) !important;
            border: 1px solid rgba(255, 215, 0, 0.10) !important;
            border-radius: 15px !important;
            color: #fff !important;
            padding: 0.9rem !important;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 500;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            width: 100%;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color) !important;
            box-shadow:
                0 0 0 3px rgba(255, 215, 0, 0.22),
                0 0 25px rgba(255, 215, 0, 0.08);
        }

        .mb-4-custom {
            margin-bottom: 1.5rem !important;
        }

        .btn-main {
            background: linear-gradient(135deg, #b45309 0%, #f59e0b 45%, #ffd700 100%);
            background-size: 200% auto;
            border: none;
            border-radius: 15px;
            padding: 0.85rem;
            font-weight: 700;
            color: #000;
            width: 100%;
            font-size: 0.95rem;
            transition: 0.35s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 24px rgba(245, 158, 11, 0.18);
            cursor: pointer;
        }

        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(245, 158, 11, 0.28);
        }

        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 215, 0, 0.08);
            color: var(--text-muted);
            border-radius: 15px;
            padding: 0.85rem;
            width: 100%;
            font-size: 0.9rem;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .btn-secondary-custom:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .results-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            padding-left: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .receipt-item {
            background: rgba(18, 22, 32, 0.58);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 215, 0, 0.10);
            border-radius: 20px;
            padding: 1.15rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 0.5s ease-out forwards;
            box-shadow:
                0 10px 25px rgba(0,0,0,0.25),
                inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .receipt-info {
            min-width: 0;
            flex: 1;
        }

        .receipt-info h4,
        .receipt-info p {
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            text-align: center;
            padding: 2.2rem 1rem;
            font-size: 0.8rem;
            color: #4b5563;
            border-top: 1px solid rgba(255, 215, 0, 0.05);
            margin-top: auto;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
        }

        .btn-view-pdf {
            background: linear-gradient(135deg, #6b21a8, #800080, #9333ea);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 0.55rem 1.1rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
            box-shadow: 0 8px 18px rgba(128, 0, 128, 0.22);
            display: inline-block;
        }

        .btn-view-pdf:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(128, 0, 128, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.25rem 1rem;
            }

            .condo-logo {
                width: 220px;
            }

            .main-title {
                font-size: 1.85rem;
            }

            .search-card {
                padding: 1.4rem 1.1rem;
            }

            .receipt-item {
                gap: 0.9rem;
                padding: 1rem;
            }

            .btn-view-pdf {
                padding: 0.5rem 0.9rem;
                font-size: 0.8rem;
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="container">
        <div class="brand-section">
            <img src="https://img1.pic.in.th/images/logo310c09ae65f63ac1d.png" alt="logo3" class="condo-logo" draggable="false">
            <div class="main-title">E-RECEIPT</div>
            <p>ระบบตรวจสอบใบเสร็จออนไลน์</p>
        </div>

        <div class="search-card">
            <div class="mb-4-custom">
                <input type="number" id="roomNo" class="form-control" placeholder="ระบุเลขห้อง" autocomplete="off">
            </div>
            <div style="display: grid; grid-template-columns: 1.8fr 1fr; gap: 10px;">
                <button class="btn-main" onclick="searchReceipts()">
                    <i class="bi bi-search me-1"></i>ค้นหา
                </button>
                <button class="btn-secondary-custom" onclick="clearSearch()">ล้าง</button>
            </div>
        </div>

        <div id="resultsArea" class="mt-4"></div>
    </div>

    <div class="footer">
        © 2026 Charoen Krung Condominium 3 | ระบบตรวจสอบใบเสร็จออนไลน์
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                clearSearch();
                return;
            }

            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }

            if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) {
                e.preventDefault();
                return false;
            }

            if (e.ctrlKey && e.shiftKey && e.keyCode === 'C'.charCodeAt(0)) {
                e.preventDefault();
                return false;
            }

            if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) {
                e.preventDefault();
                return false;
            }

            if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) {
                e.preventDefault();
                return false;
            }

            if (e.ctrlKey && e.keyCode === 'S'.charCodeAt(0)) {
                e.preventDefault();
                return false;
            }
        });

        const API_URL = "https://script.google.com/macros/s/AKfycbwjcA4Cc88COnMDbTmQgl1dBK9ZU2NsSPsLBnAzTmY0h7T6jUZLMg5znjcPSrAmJ62mDg/exec";
        const inputField = document.getElementById('roomNo');
        const resultsArea = document.getElementById('resultsArea');

        function clearSearch() {
            inputField.value = '';
            resultsArea.innerHTML = '';
            inputField.focus();
        }

        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                searchReceipts();
            }
        });

        function formatThaiPeriod(receiptNo) {
            if (!receiptNo || receiptNo.length < 4) return "ใบเสร็จรับเงิน";

            const months = [
                "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน",
                "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม",
                "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
            ];

            let yearPart = receiptNo.substring(0, 2);
            let monthPart = parseInt(receiptNo.substring(2, 4), 10);
            let targetMonthIdx = monthPart - 2;
            let targetYear = parseInt("25" + yearPart, 10);

            if (targetMonthIdx < 0) {
                targetMonthIdx = 11;
                targetYear -= 1;
            }

            return `ประจำเดือน${months[targetMonthIdx]} ${targetYear}`;
        }

        async function searchReceipts() {
            const room = inputField.value.trim();
            if (!room) return;

            resultsArea.innerHTML = `
                <div style="text-align:center; margin-top:2.5rem;">
                    <div style="width:30px; height:30px; border:3px solid rgba(255,215,0,0.1); border-top:3px solid var(--accent-color); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
                    <p style="color:var(--text-muted); font-size:0.8rem; margin-top:1.2rem;">กำลังเรียกข้อมูล...</p>
                </div>
            `;

            try {
                const resp = await fetch(`${API_URL}?action=getResidentData&room=${encodeURIComponent(room)}`);
                const data = await resp.json();

                if (!data || data.length === 0) {
                    resultsArea.innerHTML = `
                        <div style="text-align:center; color:var(--text-muted); padding:2.2rem; background:rgba(18,22,32,0.58); border-radius:20px; border:1px solid rgba(255,215,0,0.10); font-size:0.85rem; backdrop-filter:blur(12px);">
                            ไม่พบข้อมูลสำหรับห้อง ${room}
                        </div>
                    `;
                    return;
                }

                resultsArea.innerHTML = '<p class="results-label">รายการล่าสุด</p>';

                data.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'receipt-item';
                    div.style.animationDelay = (index * 0.1) + 's';

                    const displayTitle = formatThaiPeriod(item.receiptNo);

                    div.innerHTML = `
                        <div class="receipt-info">
                            <h4 style="margin:0; font-size:1.05rem; color:var(--accent-color); font-weight:700;">${displayTitle}</h4>
                            <p style="margin: 3px 0 0 0; font-size:0.8rem; color:var(--text-muted); font-family: monospace;">เลขที่: ${item.receiptNo}</p>
                        </div>
                        <div>
                            ${item.pdfUrl
                                ? `<a href="${item.pdfUrl}" target="_blank" class="btn-view-pdf">ดูใบเสร็จ</a>`
                                : `<span style="color:#4b5563; font-size:0.8rem;">รอไฟล์</span>`
                            }
                        </div>
                    `;

                    resultsArea.appendChild(div);
                });
            } catch (e) {
                resultsArea.innerHTML = `
                    <div style="color:#f87171; text-align:center; font-size:0.85rem;">
                        ระบบขัดข้อง กรุณาลองใหม่
                    </div>
                `;
            }
        }

        window.addEventListener('load', function() {
            inputField.focus();
        });
    </script>
</body>
</html>
