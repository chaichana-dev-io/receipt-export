<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตรวจสอบใบเสร็จ - เจริญกรุง คอนโดมิเนียม 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { font-size: 16px; --gold: #d4af37; }
        body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
        .resident-container { flex: 1; max-width: 500px; margin: 2rem auto; padding: 0 1.25rem; width: 100%; }
        
        /* ส่วนหัว */
        .header-box { 
            background: white; padding: 2.5rem 1.5rem; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center;
            border-bottom: 4px solid var(--gold);
        }
        .condo-logo { max-width: 200px; width: 100%; height: auto; margin-bottom: 1.5rem; }
        .main-title { font-size: 1.6rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.5rem; }
        .sub-title { font-size: 0.95rem; color: #7f8c8d; margin-bottom: 2rem; }

        /* ช่องค้นหา */
        .form-control-lg { 
            font-size: 1.3rem; border-radius: 18px; border: 2px solid #eee;
            background-color: #fdfdfd; text-align: center; transition: 0.3s;
        }
        .form-control-lg:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
        .btn-search { border-radius: 15px; font-weight: 700; padding: 0.8rem; background: #1a1a1a; border: none; color: white; }
        .btn-search:hover { background: #333; transform: translateY(-1px); }
        .btn-clear { border-radius: 15px; font-weight: 600; padding: 0.8rem; color: #888; background: #eee; border: none; }

        /* การ์ดใบเสร็จ */
        .receipt-card { 
            background: white; padding: 1.25rem 1.5rem; border-radius: 20px; 
            margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; 
            border-left: 5px solid #28a745; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: slideUp 0.4s ease-out forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .receipt-period { font-size: 1.1rem; font-weight: 700; color: #2c3e50; }
        .receipt-no { font-size: 0.85rem; color: #95a5a6; font-family: monospace; }
        .btn-download { font-size: 0.9rem; padding: 0.5rem 1.2rem; font-weight: 600; border-radius: 12px; }

        .footer { padding: 2rem; text-align: center; font-size: 0.8rem; color: #bdc3c7; margin-top: auto; }
        .spinner-border { color: var(--gold); }
    </style>
</head>
<body>

    <div class="resident-container">
        <div class="header-box">
            <img src="https://img1.pic.in.th/images/Untitled-design01481aab804c105d.png" alt="Condo Logo" class="condo-logo">
            <div class="main-title">ตรวจสอบใบเสร็จ</div>
            <p class="sub-title">กรอกหมายเลขห้องของท่านเพื่อดูประวัติ</p>
            
            <div class="mt-4">
                <input type="number" id="roomNo" class="form-control form-control-lg mb-3" placeholder="ระบุเลขห้อง (เช่น 16)" autocomplete="off">
                <div class="row g-2">
                    <div class="col-8"><button class="btn btn-primary btn-search w-100" onclick="searchReceipts()"><i class="bi bi-search me-2"></i>ค้นหา</button></div>
                    <div class="col-4"><button class="btn btn-clear w-100" onclick="clearSearch()">ล้าง</button></div>
                </div>
            </div>
        </div>

        <div id="resultsArea" class="mt-4"></div>
    </div>

    <div class="footer">
        © 2026 Charoen Krung Condominium 3 | ระบบตรวจสอบใบเสร็จออนไลน์
    </div>

   <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwjcA4Cc88COnMDbTmQgl1dBK9ZU2NsSPsLBnAzTmY0h7T6jUZLMg5znjcPSrAmJ62mDg/exec";
        const inputField = document.getElementById('roomNo');
        const resultsArea = document.getElementById('resultsArea');

        function clearSearch() {
            inputField.value = '';
            resultsArea.innerHTML = '';
            inputField.focus();
        }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchReceipts();
            if (e.key === 'Escape') clearSearch();
        });

        // 🚩 ฟังก์ชันแปลงเลขที่ใบเสร็จ (6903...) เป็น ใบเสร็จเดือนมีนาคม 2569
        function formatThaiPeriod(receiptNo) {
            if (!receiptNo || receiptNo.length < 4) return "ใบเสร็จรับเงิน";
            
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            // ตัดเลขจาก 6903...
            let yearPart = receiptNo.substring(0, 2); // 69
            let monthPart = parseInt(receiptNo.substring(2, 4)); // 03 -> 3
            
            // Logic: ปกติใบเสร็จเดือน 3 คือค่าใช้จ่ายของเดือน 2 (ย้อนหลัง 1 เดือน)
            let targetMonthIdx = monthPart - 2; 
            let targetYear = parseInt("25" + yearPart);

            // กรณีเดือนมกราคม (01) ถอยไปจะเป็นธันวาคมปีก่อนหน้า
            if (targetMonthIdx < 0) {
                targetMonthIdx = 11; // ธันวาคม
                targetYear -= 1; 
            }

            return `ใบเสร็จเดือน${months[targetMonthIdx]} ${targetYear}`;
        }

        async function searchReceipts() {
            const room = inputField.value.trim();
            if(!room) return;
            
            resultsArea.innerHTML = '<div class="text-center mt-5"><div class="spinner-border" role="status"></div><p class="mt-3 text-muted">กำลังค้นหาข้อมูล...</p></div>';

            try {
                const resp = await fetch(`${API_URL}?action=getResidentData&room=${room}`);
                const data = await resp.json();

                if (!data || data.length === 0) {
                    resultsArea.innerHTML = '<div class="alert alert-light text-center shadow-sm" style="border-radius:20px; color:#95a5a6;"><i class="bi bi-search me-2"></i>ไม่พบข้อมูลใบเสร็จของห้อง ' + room + '</div>';
                    return;
                }

                resultsArea.innerHTML = '<p class="text-muted mb-3 ps-2" style="font-size:0.8rem; font-weight:600;">รายการล่าสุดของท่าน</p>';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'receipt-card';
                    
                    // 🚩 ใช้ฟังก์ชันแปลงเลขที่ใบเสร็จเป็นชื่อเดือน
                    const displayTitle = formatThaiPeriod(item.receiptNo);
                    
                    div.innerHTML = `
                        <div>
                            <div class="receipt-period">${displayTitle}</div>
                            <span class="receipt-no">เลขที่: ${item.receiptNo}</span>
                        </div>
                        <div>
                            ${item.pdfUrl ? 
                                `<a href="${item.pdfUrl}" target="_blank" class="btn btn-success btn-download"><i class="bi bi-file-earmark-pdf me-1"></i>ดูไฟล์</a>` : 
                                `<span class="badge bg-light text-muted p-2" style="font-weight:400; border-radius:8px;">รอไฟล์ PDF</span>`
                            }
                        </div>
                    `;
                    resultsArea.appendChild(div);
                });
            } catch (e) {
                resultsArea.innerHTML = '<div class="alert alert-danger text-center shadow-sm" style="border-radius:20px;">ระบบขัดข้อง กรุณาลองใหม่ภายหลัง</div>';
            }
        }
    </script>
</body>
</html>
