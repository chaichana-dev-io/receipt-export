<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบใบเสร็จ - เจริญกรุง คอนโดมิเนียม 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .resident-container { flex: 1; max-width: 500px; margin: 40px auto; padding: 20px; width: 100%; }
        .header-box { background: white; padding: 40px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .condo-logo { max-width: 220px; width: 100%; height: auto; margin-bottom: 25px; }
        .receipt-card { background: white; padding: 20px; border-radius: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #28a745; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .receipt-card:hover { transform: scale(1.02); }
        .btn-search { border-radius: 12px; font-weight: bold; padding: 12px; }
        .btn-clear { border-radius: 12px; font-weight: bold; padding: 12px; color: #6c757d; background-color: #f1f3f5; border: 1px solid #dee2e6; }
        .footer { padding: 20px; text-align: center; font-size: 0.85rem; color: #6c757d; margin-top: auto; }
    </style>
</head>
<body>

    <div class="resident-container">
        <div class="header-box">
            <a href="https://pic.in.th/image/Untitled-design.82jiNR" target="_blank">
                <img src="https://img1.pic.in.th/images/Untitled-design01481aab804c105d.png" alt="Condo Logo" class="condo-logo">
            </a>
            <h4 class="fw-bold">ตรวจสอบใบเสร็จรับเงิน</h4>
            <div class="mt-4">
                <input type="number" id="roomNo" class="form-control form-control-lg text-center mb-3" style="border-radius: 15px; border: 2px solid #dee2e6;" placeholder="ระบุเลขห้อง (เช่น 101)" autocomplete="off">
                <div class="row g-2">
                    <div class="col-8"><button class="btn btn-primary btn-search w-100 shadow-sm" onclick="searchReceipts()"><i class="bi bi-search"></i> ค้นหา</button></div>
                    <div class="col-4"><button class="btn btn-clear w-100" onclick="clearSearch()">ล้าง</button></div>
                </div>
            </div>
        </div>
        <div id="resultsArea" class="mt-4"></div>
    </div>

    <div class="footer">
        © 2026 Charoen Krung Condominium 3 | บริหารจัดการโดยนิติบุคคล
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyfjoIoU0viOW4_4NtCmqZ1wLxSYQPQRdAZv7cQIf6-lCMLbDjfpYHYZ28FkSojBeivJA/exec";
        const inputField = document.getElementById('roomNo');
        const resultsArea = document.getElementById('resultsArea');

        // ฟังก์ชันล้างข้อมูล
        function clearSearch() { inputField.value = ''; resultsArea.innerHTML = ''; inputField.focus(); }

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); searchReceipts(); }
            else if (e.key === 'Escape') { clearSearch(); }
        });

        // --- LOGIC ใหม่: แปลงเลขที่ใบเสร็จเป็น เดือนย้อนหลัง ---
        function formatThaiPeriod(receiptNo) {
            if (!receiptNo || receiptNo.length < 4) return "ใบเสร็จรับเงิน";
            
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            let year = receiptNo.substring(0, 2); // ดึง '69'
            let monthVal = parseInt(receiptNo.substring(2, 4)); // ดึง '03' -> 3
            
            // ย้อนหลัง 1 เดือน
            let targetMonthIdx = monthVal - 2; // -2 เพราะ index เริ่มที่ 0 และต้องถอยอีก 1 (3-1-1 = 1 คือ กุมภาพันธ์)
            let targetYear = year;

            if (targetMonthIdx < 0) {
                targetMonthIdx = 11; // มกราคม (01) ถอยไปจะเป็น ธันวาคม (12)
                targetYear = (parseInt(year) - 1).toString(); // ลดปีลง 1 ถ้าต้องการ
            }

            return `ใบเสร็จเดือน${months[targetMonthIdx]}${targetYear}`;
        }

        async function searchReceipts() {
            const room = inputField.value;
            if(!room) return;
            resultsArea.innerHTML = '<div class="text-center mt-4"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted small">กำลังค้นหา...</p></div>';

            try {
                const resp = await fetch(`${API_URL}?action=getResidentData&room=${room}`);
                const data = await resp.json();

                if (!data || data.length === 0) {
                    resultsArea.innerHTML = '<div class="alert alert-warning text-center" style="border-radius:15px;">ไม่พบข้อมูลใบเสร็จในระบบ</div>';
                    return;
                }

                resultsArea.innerHTML = '<p class="text-muted mb-2 ps-2 small">รายการล่าสุด:</p>';
                data.forEach(item => {
                    // เรียกใช้ Logic แปลงชื่อเดือนจาก receiptNo
                    const displayTitle = formatThaiPeriod(item.receiptNo);
                    
                    const div = document.createElement('div');
                    div.className = 'receipt-card';
                    div.innerHTML = `
                        <div>
                            <div class="fw-bold" style="color: #212529;">${displayTitle}</div>
                            <small class="text-muted">เลขที่: ${item.receiptNo}</small>
                        </div>
                        <div>
                            ${item.pdfUrl ? `<a href="${item.pdfUrl}" target="_blank" class="btn btn-success btn-sm rounded-pill px-3 shadow-sm"><i class="bi bi-download"></i> ดูไฟล์</a>` : '<span class="badge bg-light text-muted p-2">รอไฟล์</span>'}
                        </div>
                    `;
                    resultsArea.appendChild(div);
                });
            } catch (e) {
                resultsArea.innerHTML = '<div class="alert alert-danger text-center" style="border-radius:15px;">ระบบขัดข้อง</div>';
            }
        }
    </script>
</body>
</html>
